{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5 col-lg-4">
        <!-- Glass card -->
        <div class="card-modern p-4">
            <div class="text-center mb-3">
                <i class="fas fa-key fa-2x" style="color: var(--primary-light); opacity: 0.7;"></i>
            </div>
            <h3 class="text-center mb-4" style="font-family: var(--font-display); font-weight: 700; color: #F8FAFC;">
                Forgot Password
            </h3>
            <p class="text-center mb-4" style="color: #94A3B8; font-size: 0.95rem;">
                Enter your registered email and we'll send you an OTP to reset your password.
            </p>
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label-custom">Email Address</label>
                    <input type="email" name="email" class="form-control-dark" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary-gradient w-100 py-2">
                    <i class="fas fa-paper-plane me-2"></i> Send OTP
                </button>
            </form>
            <p class="mt-3 mb-0 text-center" style="color: #94A3B8;">
                <a href="{{ url_for('login') }}" style="color: var(--primary-light); font-weight: 500; text-decoration: none;">
                    Back to Login
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<style>
    /* Reuse the same input and label styling as the login page */
    .form-label-custom {
        font-weight: 500;
        color: #E2E8F0;
        margin-bottom: 4px;
        display: block;
    }
    .form-control-dark {
        background: rgba(25, 25, 50, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: #F1F5F9;
        padding: 10px 14px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        width: 100%;
        box-sizing: border-box;
    }
    .form-control-dark:focus {
        background: rgba(30, 30, 60, 0.9);
        border-color: var(--primary);
        box-shadow: 0 0 12px rgba(168, 85, 247, 0.35), inset 0 2px 4px rgba(0,0,0,0.2);
        color: #fff;
        outline: none;
    }
    .form-control-dark::placeholder {
        color: #94A3B8;
        opacity: 0.8;
    }
</style>
{% endblock %}
