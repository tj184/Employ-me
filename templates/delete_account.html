{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card-modern p-4 text-center">
            <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: var(--accent-gold);"></i>
            <h3 style="font-family: var(--font-display); font-weight: 700; color: #F8FAFC;">Delete Account</h3>
            <p class="text-secondary mb-4">
                This action is <strong>irreversible</strong>. To confirm, enter your date of birth as registered in your profile.
            </p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label-custom" for="dob">Date of Birth <span class="text-danger">*</span></label>
                    <input type="date" name="dob" id="dob" class="form-control-dark" required>
                </div>
                <button type="submit" class="btn btn-danger w-100" onclick="return confirm('Are you absolutely sure? This cannot be undone.')">
                    <i class="fas fa-trash-alt me-2"></i> Delete My Account
                </button>
            </form>
            <a href="{{ url_for('index') }}" class="btn btn-outline-soft w-100 mt-3">
                <i class="fas fa-arrow-left me-2"></i> Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<style>
    .form-label-custom {
        font-weight: 500;
        color: #CBD5E1;
        margin-bottom: 6px;
    }
    .form-control-dark {
        background: rgba(15, 15, 30, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: #F1F5F9;
        padding: 10px 14px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }
    .form-control-dark:focus {
        background: rgba(20, 20, 45, 0.8);
        border-color: var(--primary);
        box-shadow: 0 0 12px rgba(168, 85, 247, 0.25);
        color: #fff;
        outline: none;
    }
</style>
{% endblock %}
